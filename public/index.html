<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitCoach - 智能健身教练平台</title>
    <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
    <!-- 登录注册模块 -->
    <div class="auth-container" id="authSection">
        <div class="auth-box">
            <h2>欢迎使用 FitCoach</h2>
            <div class="auth-tabs">
                <button class="tab active" data-tab="login">登录</button>
                <button class="tab" data-tab="register">注册</button>
            </div>
            
            <!-- 登录表单 -->
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <input type="text" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn-primary">登录</button>
            </form>

            <!-- 注册表单 -->
            <form class="auth-form hidden" id="registerForm">
                <div class="form-group">
                    <input type="text" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="请输入密码（至少8位，包含字母和数字）" required pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$">
                </div>
                <div class="form-group">
                    <input type="password" name="confirmPassword" placeholder="请确认密码" required>
                </div>
                <div class="form-group">
                    <select name="role" required>
                        <option value="">请选择身份</option>
                        <option value="coach">我是教练</option>
                        <option value="trainee">我是学员</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">注册</button>
            </form>
        </div>
    </div>

    <!-- 教练端界面 -->
    <div class="coach-dashboard hidden" id="coachSection">
        <nav class="sidebar">
            <div class="logo">FitCoach</div>
            <ul class="nav-links">
                <li><a href="#templates">训练计划模板</a></li>
                <li><a href="#creator">快速创建工具</a></li>
                <li><a href="#groups">学员分组管理</a></li>
            </ul>
            <button class="btn-secondary logout-btn">退出登录</button>
        </nav>
        
        <main class="main-content">
            <h1>欢迎来到教练控制台</h1>
        </main>
    </div>

    <!-- 学员端界面 -->
    <div class="trainee-dashboard hidden" id="traineeSection">
        <nav class="sidebar">
            <div class="logo">FitCoach</div>
            <ul class="nav-links">
                <li><a href="#calendar">训练日程</a></li>
                <li><a href="#feedback">训练反馈</a></li>
            </ul>
            <button class="btn-secondary logout-btn">退出登录</button>
        </nav>

        <main class="main-content">
            <h1>欢迎来到学员控制台</h1>
        </main>
    </div>

    <script>
        // 常量定义
        const API_BASE_URL = 'http://localhost:3000/api';
        const TOKEN_KEY = 'fitcoach_token';
        const ROLE_KEY = 'fitcoach_role';

        // DOM元素
        const authSection = document.getElementById('authSection');
        const coachSection = document.getElementById('coachSection');
        const traineeSection = document.getElementById('traineeSection');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const tabs = document.querySelectorAll('.tab');
        const logoutBtns = document.querySelectorAll('.logout-btn');

        // 表单切换
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const tabType = tab.dataset.tab;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                if (tabType === 'login') {
                    loginForm.classList.remove('hidden');
                    registerForm.classList.add('hidden');
                } else {
                    loginForm.classList.add('hidden');
                    registerForm.classList.remove('hidden');
                }
            });
        });

        // 注册表单提交
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(registerForm);
            
            // 验证密码
            if (formData.get('password') !== formData.get('confirmPassword')) {
                alert('两次输入的密码不一致');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: formData.get('username'),
                        password: formData.get('password'),
                        role: formData.get('role')
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    alert('注册成功！请登录');
                    // 切换到登录表单
                    tabs[0].click();
                } else {
                    alert(data.error || '注册失败，请重试');
                }
            } catch (error) {
                console.error('注册错误:', error);
                alert('注册失败，请重试');
            }
        });

        // 登录表单提交
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log('登录表单提交');
            const formData = new FormData(loginForm);

            try {
                const loginData = {
                    username: formData.get('username'),
                    password: formData.get('password')
                };
                
                console.log('发送登录请求:', loginData);
                
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(loginData)
                });

                console.log('收到响应:', response.status);
                const data = await response.json();
                console.log('响应数据:', data);
                
                if (response.ok) {
                    // 保存token和角色
                    localStorage.setItem(TOKEN_KEY, data.token);
                    localStorage.setItem(ROLE_KEY, data.role);
                    
                    // 显示对应的界面
                    showDashboard(data.role);
                    alert('登录成功！');
                } else {
                    alert(data.error || '登录失败，请重试');
                }
            } catch (error) {
                console.error('登录错误:', error);
                alert('登录失败，请检查网络连接或联系管理员');
            }
        });

        // 退出登录
        logoutBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                localStorage.removeItem(TOKEN_KEY);
                localStorage.removeItem(ROLE_KEY);
                showAuthSection();
            });
        });

        // 显示仪表板
        function showDashboard(role) {
            authSection.classList.add('hidden');
            coachSection.classList.add('hidden');
            traineeSection.classList.add('hidden');

            if (role === 'coach') {
                coachSection.classList.remove('hidden');
            } else if (role === 'trainee') {
                traineeSection.classList.remove('hidden');
            }
        }

        // 显示认证界面
        function showAuthSection() {
            authSection.classList.remove('hidden');
            coachSection.classList.add('hidden');
            traineeSection.classList.add('hidden');
        }

        // 检查登录状态
        function checkAuth() {
            const token = localStorage.getItem(TOKEN_KEY);
            const role = localStorage.getItem(ROLE_KEY);
            
            if (token && role) {
                showDashboard(role);
            } else {
                showAuthSection();
            }
        }

        // 页面加载时检查登录状态
        checkAuth();
    </script>
</body>
</html>
